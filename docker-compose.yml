services:
  # --- Base de données commune ---
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: email_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - ./db_setup.sql:/docker-entrypoint-initdb.d/db_setup.sql:ro
      - mysql_data:/var/lib/mysql

  # --- Serveur d'Authentification RMI (DOIT démarrer avant les nœuds web) ---
  auth-rmi:
    build: .
    entrypoint: ["java", "-cp", "app.jar", "org.example.auth.AuthServerApp"]
    environment:
      DB_HOST: database
      DB_PASSWORD: root
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "1099:1099"
    # expose le port RMI aux autres services du réseau Docker
    expose:
      - "1099"

  # --- Noeuds Applicatifs (Load Balanced) ---
  mail-node-1:
    build: .
    environment:
      DB_HOST: database
      DB_PASSWORD: root
      RMI_HOST: auth-rmi
      POP3_HOST: localhost
      SMTP_HOST: localhost
    depends_on:
      database:
        condition: service_healthy
      auth-rmi:
        condition: service_started
    ports:
      - "8081:8080"
    volumes:
      - ./src/main/resources/web:/app/src/main/resources/web:ro

  mail-node-2:
    build: .
    environment:
      DB_HOST: database
      DB_PASSWORD: root
      RMI_HOST: auth-rmi
      POP3_HOST: localhost
      SMTP_HOST: localhost
    depends_on:
      database:
        condition: service_healthy
      auth-rmi:
        condition: service_started
    ports:
      - "8082:8080"
    volumes:
      - ./src/main/resources/web:/app/src/main/resources/web:ro

  mail-node-3:
    build: .
    environment:
      DB_HOST: database
      DB_PASSWORD: root
      RMI_HOST: auth-rmi
      POP3_HOST: localhost
      SMTP_HOST: localhost
    depends_on:
      database:
        condition: service_healthy
      auth-rmi:
        condition: service_started
    ports:
      - "8083:8080"
    volumes:
      - ./src/main/resources/web:/app/src/main/resources/web:ro

  # --- Load Balancer (NGINX) ---
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx-docker.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - mail-node-1
      - mail-node-2
      - mail-node-3

volumes:
  mysql_data:

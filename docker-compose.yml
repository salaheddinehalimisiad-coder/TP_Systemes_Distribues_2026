services:
  # --- Base de données commune ---
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: email_db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - ./db_setup.sql:/docker-entrypoint-initdb.d/db_setup.sql:ro

  # --- Noeuds Applicatifs (Load Balanced) ---
  mail-node-1:
    build: .
    environment:
      DB_HOST: database
      DB_PASSWORD: root
      RMI_HOST: host.docker.internal
      POP3_HOST: host.docker.internal
      SMTP_HOST: host.docker.internal
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - ./src/main/resources/web:/app/src/main/resources/web:ro

  mail-node-2:
    build: .
    environment:
      DB_HOST: database
      DB_PASSWORD: root
      RMI_HOST: host.docker.internal
      POP3_HOST: host.docker.internal
      SMTP_HOST: host.docker.internal
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8082:8080"
    volumes:
      - ./src/main/resources/web:/app/src/main/resources/web:ro

  mail-node-3:
    build: .
    environment:
      DB_HOST: database
      DB_PASSWORD: root
      RMI_HOST: host.docker.internal
      POP3_HOST: host.docker.internal
      SMTP_HOST: host.docker.internal
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8083:8080"
    volumes:
      - ./src/main/resources/web:/app/src/main/resources/web:ro

  # --- Load Balancer (NGINX) ---
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx-docker.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - mail-node-1
      - mail-node-2
      - mail-node-3

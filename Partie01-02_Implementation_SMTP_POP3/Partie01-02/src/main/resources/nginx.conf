# Configuration NGINX pour le Load Balancing (Partie 8)
# Ce fichier doit être placé dans le répertoire de configuration de NGINX

events {
    worker_connections 1024;
}

http {
    # Définition du cluster de serveurs backend (Round Robin par défaut)
    upstream emp_mail_cluster {
        # Si sticky sessions sont nécessaires (pour sessionPasswords en mémoire):
        # ip_hash; 
        
        server 127.0.0.1:8080 weight=1;
        server 127.0.0.1:8081 weight=1;
        server 127.0.0.1:8082 weight=1;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://emp_mail_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Temps d'attente pour la détection de serveur indisponible
            proxy_connect_timeout 2s;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }
    }
}

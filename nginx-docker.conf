events {
    worker_connections 1024;
}

http {
    # Sticky sessions nécessaires car sessionPasswords est stocké en mémoire par nœud
    upstream emp_mail_cluster {
        ip_hash; # même client → même nœud (important pour les sessions en mémoire)
        server mail-node-1:8080;
        server mail-node-2:8080;
        server mail-node-3:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Support WebSocket (requis pour les notifications temps réel)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        location / {
            proxy_pass http://emp_mail_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Temps d'attente pour la détection de serveur indisponible
            proxy_connect_timeout 2s;
            proxy_read_timeout 3600s; # long timeout pour les WebSockets
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        }
    }
}
